  <h2>雑学一覧</h2>

  <ul>
    <li>タコの血は青い（ヘモシアニンという成分のため）</li>
    <li>イルカは片目ずつ閉じて寝る</li>
    <li>バナナは植物学的にはベリーの一種</li>
    <li>カエルは目を閉じて飲み込むときに目玉を押し込んで食べるのを助ける</li>
    <li>人間の鼻は一生成長し続ける</li>
    <li>カタツムリには歯が1万本以上ある</li>
    <li>コアラの指紋は人間とほぼ同じ構造</li>
    <li>ハチは人の顔を覚えられる</li>
    <li>エベレストは今も毎年少しずつ高くなっている</li>
    <li>コーヒーは実は果物の種からできている</li>
  </ul>
